# Adjustable classifier policy for scaffold changes (sourced by classify.sh). TRACKED — edit to tune how
# often the human (PM) is pulled in. The starting point is low-stakes precisely because it's adjustable.
#
# A scaffold change is ARCHITECTURAL (needs the PM's design approval) unless it's clearly mechanical.
# Fail-closed: architectural is the DEFAULT; mechanical is an explicit, recorded opt-out (never silent).
#
# ALWAYS_ARCHITECTURAL — a changed path matching ANY of these globs => architectural, no judgment.
# These are the high-blast-radius surfaces (the constitution + anything that changes a skill's behavior or
# the product's contract). Tune by adding/removing globs.
ALWAYS_ARCHITECTURAL=(
  'CLAUDE.md'
  'AGENTS.md'
  '*/CLAUDE.md'
  '*/AGENTS.md'
  'plugins/*/skills/*/SKILL.md'             # a skill's instructions ARE its behavior
  'plugins/*/skills/*/scripts/*'            # a skill's code is its behavior
  'plugins/*/.claude-plugin/plugin.json'    # the plugin contract/version
  '.claude-plugin/marketplace.json'         # the discovery surface
  '.aar-ci/*'                               # the CI policy itself
  '.githooks/*'                             # the secrets gate
  'proposals/*'                             # a design proposal
)
